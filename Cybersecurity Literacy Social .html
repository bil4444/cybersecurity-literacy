   explain_zh:"這類「中國科技盛世」影片常誇大或捏造細節，製造「中國模式優越」的印象。「完成所有家務、精準識別情緒」的描述遠超現有機器人技術水平。查原始新聞來源與技術規格再判斷。",

   bubbles_zh:[{s:"recv",t:"台灣青年到中國發展！政府補助200萬創業金，保證成功！"},{s:"recv",t:"名額有限，今天報名了解詳情，不要錯過千載難逢的機會！"},{s:"recv",t:"點這裡報名 👉 tw-youth-cn-invest.com"}],

   caption_en:"YouTube video: \"Doctors hide this! Drink this daily, clears blood clots in 3 days\" — AI voice + stolen doctor photo. 100,000 people have witnessed the results. Share with family!",
   left:{zh:"分享到家族群組",en:"Share to family group chat"},right:{zh:"略過並向 YouTube 檢舉",en:"Skip & report to YouTube"},correct:"right",
   explain_zh:"這類影片盜用名醫照片、使用AI合成聲音、以「醫生不告訴你」製造緊迫感。Cofacts已多次查證為假。原則：能三天治好的療法，諾貝爾獎早就頒出去了。",
   explain_en:"These videos steal doctor photos, use AI-generated voices, and exploit \"doctors hide this\" urgency framing. Cofacts has debunked many. Rule: if a 3-day cure existed, it would have won a Nobel Prize."},

   user_zh:"taiwan_health_official",user_en:"taiwan_health_official",av:"av-blue",verified:true,
   img_class:"bg-green",
   img_headline_zh:"衛福部認證！神奇減肥糖，一個月瘦20公斤",img_headline_en:"MOHW-certified! Miracle diet candy — lose 20kg in a month",
   img_sub_zh:"限時特價 85折｜數量有限",img_sub_en:"Limited time 15% off｜While supplies last",
   img_url:"mohw-diet-official.com.cn",
   likes:"5,672",time_zh:"3天前",time_en:"3d ago",
   caption_zh:"衛福部認證！神奇減肥糖，一個月瘦20公斤，已有超過10萬人見證。限時特價，請至 mohw-diet-official.com.cn 訂購！",
   caption_en:"MOHW-certified! Miracle diet candy, lose 20kg in one month, over 100,000 people have witnessed results. Limited time offer at mohw-diet-official.com.cn!",
   left:{zh:"限時優惠，快買",en:"Limited offer, buy now"},right:{zh:"查食藥署資料庫",en:"Check Taiwan FDA database"},correct:"right",
   explain_zh:"衛福部從不為「減肥糖」背書。可上食藥署消費者知識服務網查證任何宣稱認證的產品。一個月瘦20公斤已超出醫學安全範圍，這類廣告多為詐騙。",
   explain_en:"MOHW never endorses \"miracle\" diet products. Verify any \"certified\" claim on the Taiwan FDA consumer portal. 20kg/month far exceeds safe medical limits — these ads are almost always fraudulent."}
];
</script>
<script type="text/babel">
const {useState, useEffect} = React;
const SCENE = {TITLE:'title', QUESTION:'question', FEEDBACK:'feedback', END:'end'};
const QPR = 5;

function pickN(arr, n) {
  const c=[...arr], o=[];
  for(let i=0;i<n&&c.length;i++){const idx=Math.floor(Math.random()*c.length);o.push(c.splice(idx,1)[0]);}
  return o;
}

const StickmanSVG = ({mood='neutral', color='#1e293b', size=56}) => {
  const face = mood==='happy'?<path d="M26 15 Q32 21 38 15" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"/>:
               mood==='sad'?<path d="M26 18 Q32 13 38 18" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"/>:
               <path d="M27 15 L37 15" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"/>;
  const arms = mood==='cheer'?
    <><line x1="32" y1="32" x2="14" y2="20" stroke={color} strokeWidth="3.5" strokeLinecap="round"/>
      <line x1="32" y1="32" x2="50" y2="20" stroke={color} strokeWidth="3.5" strokeLinecap="round"/></>:
    <><line x1="32" y1="34" x2="16" y2="30" stroke={color} strokeWidth="3.5" strokeLinecap="round"/>
      <line x1="32" y1="34" x2="48" y2="30" stroke={color} strokeWidth="3.5" strokeLinecap="round"/></>;
  return (
    <svg width={size} height={size*1.1} viewBox="0 0 64 70" fill="none">
      <circle cx="32" cy="14" r="11" fill="none" stroke={color} strokeWidth="3.5"/>
      <circle cx="28.5" cy="11" r="1.8" fill={color}/><circle cx="35.5" cy="11" r="1.8" fill={color}/>
      {face}
      <line x1="32" y1="25" x2="32" y2="46" stroke={color} strokeWidth="3.5" strokeLinecap="round"/>
      {arms}
      <line x1="32" y1="46" x2="22" y2="62" stroke={color} strokeWidth="3.5" strokeLinecap="round"/>
      <line x1="32" y1="46" x2="42" y2="62" stroke={color} strokeWidth="3.5" strokeLinecap="round"/>
    </svg>
  );
};

const IGPost = ({q, lang, T}) => (
  <div className="post">
    <div className="post-header">
      <div className={`avatar ${q.av}`}>{(lang==='zh'?q.user_zh:q.user_en).slice(0,2).toUpperCase()}</div>
      <div>
        <div className="post-user">{lang==='zh'?q.user_zh:q.user_en}{q.verified&&<span className="post-verified"/>}</div>
        <div className="post-time">{lang==='zh'?q.time_zh:q.time_en}</div>
      </div>
      <div className="post-dots">···</div>
    </div>
    <div className={`post-img ${q.img_class}`}>
      <div className="post-img-headline">{lang==='zh'?q.img_headline_zh:q.img_headline_en}</div>
      <div className="post-img-sub">{lang==='zh'?q.img_sub_zh:q.img_sub_en}</div>
      {q.img_url&&<div className="post-img-url">🔗 {q.img_url}</div>}
    </div>
    <div className="post-actions">
      <span>🤍</span><span>💬</span><span>📤</span>
      <span className="post-save">🔖</span>
    </div>
    {q.likes&&<div className="post-likes">讚 {q.likes}</div>}
    <div className="post-caption"><b>{lang==='zh'?q.user_zh:q.user_en}</b> {lang==='zh'?q.caption_zh:q.caption_en}</div>
  </div>
);

const WAThread = ({q, lang}) => (
  <div className="post">
    <div className="post-header">
      <div className={`avatar ${q.av}`}>💬</div>
      <div>
        <div className="post-user">{lang==='zh'?q.user_zh:q.user_en}</div>
        <div className="post-time">{lang==='zh'?q.time_zh:q.time_en}</div>
      </div>
    </div>
    <div className="wa-thread">
      {(lang==='zh'?q.bubbles_zh:q.bubbles_en).map((b,i,arr)=>(
        <div key={i}>
          <div className={`wa-bubble ${b.s==='recv'?'recv':'sent'}`}>{b.t}</div>
          {i===arr.length-1&&<div className="wa-tick">✓✓ {lang==='zh'?q.time_zh:q.time_en}</div>}
        </div>
      ))}
    </div>
  </div>
);

const App = () => {
  const [scene, setScene] = useState(SCENE.TITLE);
  const [lang, setLang] = useState('zh');
  const [qs, setQs] = useState([]);
  const [qi, setQi] = useState(0);
  const [res, setRes] = useState([]);
  const [lc, setLc] = useState(null);
  const [flash, setFlash] = useState(null);
  const T = (zh, en) => lang==='zh'?zh:en;

  useEffect(()=>{
    const h=e=>{
      if(scene===SCENE.QUESTION){
        if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')choose('left');
        else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')choose('right');
      } else if(scene===SCENE.FEEDBACK){if(e.key==='Enter'||e.key===' ')next();}
      else if(scene===SCENE.TITLE||scene===SCENE.END){if(e.key==='Enter'||e.key===' ')start();}
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  });

  const start=()=>{setQs(pickN(window.QB,QPR));setQi(0);setRes([]);setLc(null);setFlash(null);setScene(SCENE.QUESTION);};
  const choose=(side)=>{
    if(lc)return;
    const q=qs[qi],ok=side===q.correct;
    setLc(side);setFlash(side);setRes(r=>[...r,ok]);
    setTimeout(()=>setScene(SCENE.FEEDBACK),500);
  };
  const next=()=>{
    setLc(null);setFlash(null);
    if(qi+1>=qs.length)setScene(SCENE.END);
    else{setQi(i=>i+1);setScene(SCENE.QUESTION);}
  };

  const correct=res.filter(Boolean).length;
  const lastCorrect=res[res.length-1];
  const q=qs[qi];
  const awarenessW=res.length===0?'70%':`${(correct/res.length)*100}%`;
  const awarenessColor=res.length===0?'#2ecc71':correct/res.length>=0.6?'#2ecc71':correct/res.length>=0.4?'#f59e0b':'#ef4444';

  const getLeftClass = () => {
    if(!flash||flash!=='left') return 'choice-btn cb-blue';
    return `choice-btn ${lc===q.correct?'cb-correct':'cb-wrong'}`;
  };
  const getRightClass = () => {
    if(!flash||flash!=='right') return 'choice-btn cb-pink';
    return `choice-btn ${lc===q.correct?'cb-correct':'cb-wrong'}`;
  };

  return (
    <div className="phone">
      <div className="ig-bar">
        <div className="ig-logo">Cybersecurity</div>
        <button className="lang-pill" onClick={()=>setLang(l=>l==='zh'?'en':'zh')}>{lang==='zh'?'EN':'中文'}</button>
      </div>
      <div className="awareness-bar-wrap">
        <div className="awareness-label">Awareness</div>
        <div className="awareness-bg"><div className="awareness-fill" style={{width:awarenessW,background:awarenessColor}}/></div>
        {(scene===SCENE.QUESTION||scene===SCENE.FEEDBACK)&&
          <div className="q-counter">{qi+1}/{QPR}</div>}
      </div>

      <div className="feed">
        {scene===SCENE.TITLE&&(
          <div className="title-card">
            <div className="title-logo">Cybersecurity Literacy</div>
            <div style={{fontSize:13,color:'#8e8e8e',fontWeight:600}}>資訊安全與數位操弄</div>
            <StickmanSVG mood="cheer" color="#2d5be3" size={66}/>
            <div className="title-desc">{T('5 道題，每題二選一\n答錯沒關係，每個人都會犯錯','5 questions · 2 choices each\nIt\'s OK to get one wrong\nEveryone makes mistakes')}</div>
            <button className="btn-start" onClick={start}>{T('▶ 開始','▶ Start')}</button>
            <div className="source-note">{T('題材參考 Cofacts','Sources: Cofacts')}</div>
          </div>
        )}

        {scene===SCENE.QUESTION&&q&&(
          <>
            <div className="scene-label">{T('你會怎麼做？','What would you do?')}</div>
            {q.type==='ig'?<IGPost q={q} lang={lang} T={T}/>:<WAThread q={q} lang={lang} T={T}/>}
            <div className="choice-area">
              <button className={getLeftClass()} onClick={()=>choose('left')} disabled={!!lc}>
                👈 {lang==='zh'?q.left.zh:q.left.en}
              </button>
              <button className={getRightClass()} onClick={()=>choose('right')} disabled={!!lc}>
                👉 {lang==='zh'?q.right.zh:q.right.en}
              </button>
            </div>
          </>
        )}

        {scene===SCENE.FEEDBACK&&q&&(
          <>
            {q.type==='ig'?<IGPost q={q} lang={lang} T={T}/>:<WAThread q={q} lang={lang} T={T}/>}
            <div className="fb-area">
              <div className={`fb-badge ${lastCorrect?'ok':'no'}`}>
                {lastCorrect?T('✓ 正確！','✓ Correct!'):T('✗ 答錯了','✗ Wrong')}
              </div>
              <div className="fb-ans">{T('正確答案','Correct answer')}: <span>
                {q.correct==='left'?(lang==='zh'?q.left.zh:q.left.en):(lang==='zh'?q.right.zh:q.right.en)}
              </span></div>
              <div className={`fb-explain ${lastCorrect?'':'no'}`}>{lang==='zh'?q.explain_zh:q.explain_en}</div>
              <button className="btn-next" onClick={next}>
                {qi+1>=QPR?T('看結果 →','See results →'):T('下一則 →','Next →')}
              </button>
            </div>
          </>
        )}

        {scene===SCENE.END&&(()=>{
          const perfect=correct===QPR,good=correct>=3;
          const mood=perfect?'cheer':good?'happy':'sad';
          const color=perfect?'#2d5be3':good?'#059669':'#ef4444';
          const headline=perfect?T('★ 全部答對！','★ Flawless!'):good?T('答得不錯！','Not bad!'):T('繼續加油！','Keep learning!');
          const sub=perfect?T('你是資安守護者！','You are a Cyber Guardian!'):good?T('繼續精進辨識力','Keep sharpening your skills'):T('看完解說再挑戰一次','Review the tips and retry');
          return(
            <div className="end-card">
              <div className="end-scene">
                <div className="end-ground"/>
                <div className="end-sm"><StickmanSVG mood={mood} color={color} size={56}/></div>
              </div>
              <div className="end-headline" style={{color}}>{headline}</div>
              <div className="end-sub">{sub}</div>
              <div className="end-score">{T('得分','Score')}: {correct} / {QPR}</div>
              <div className="pips">{res.map((r,i)=><div key={i} className={`pip ${r?'ok':'no'}`}>{r?'✓':'✗'}</div>)}</div>
              <button className="btn-replay" onClick={start}>{T('▶ 再玩一次','▶ Play again')}</button>
            </div>
          );
        })()}
      </div>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
