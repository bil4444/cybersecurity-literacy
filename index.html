<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cybersecurity Literacy</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
/* 8-bit Arcade Stickman Quiz Game */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
  background: #000;
  font-family: 'Press Start 2P', monospace;
  color: #fff;
  overflow: hidden;
  -webkit-font-smoothing: none;
  font-smooth: never;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

#root {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cabinet {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse at center, #1a0a2e 0%, #000 70%),
    #000;
  position: relative;
  overflow: hidden;
}

.cabinet::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
  z-index: 100;
}

.cabinet::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(
    ellipse at center,
    transparent 50%,
    rgba(0,0,0,0.6) 100%
  );
  pointer-events: none;
  z-index: 99;
}

.screen {
  width: min(1400px, 98vw);
  height: min(900px, 98vh);
  background: #0d0221;
  border: 8px solid #2a1a4a;
  border-radius: 18px;
  box-shadow:
    0 0 0 4px #1a0a2e,
    0 0 80px rgba(255, 0, 200, 0.25),
    inset 0 0 100px rgba(0, 0, 0, 0.6);
  position: relative;
  overflow: hidden;
  padding: 20px 28px;
  display: flex;
  flex-direction: column;
}

.pixel-border {
  position: absolute;
  inset: 12px;
  border: 3px dashed #ff2bd6;
  pointer-events: none;
  opacity: 0.35;
}

.px {
  font-family: 'Press Start 2P', monospace;
  letter-spacing: 0;
  line-height: 1.6;
}

.glow-cyan { color: #4dffea; text-shadow: 0 0 10px #4dffea, 0 0 20px rgba(77,255,234,0.5); }
.glow-pink { color: #ff2bd6; text-shadow: 0 0 10px #ff2bd6, 0 0 20px rgba(255,43,214,0.5); }
.glow-yellow { color: #ffd23f; text-shadow: 0 0 10px #ffd23f, 0 0 20px rgba(255,210,63,0.5); }
.glow-green { color: #44ff7c; text-shadow: 0 0 10px #44ff7c, 0 0 20px rgba(68,255,124,0.5); }
.glow-red { color: #ff3860; text-shadow: 0 0 10px #ff3860, 0 0 20px rgba(255,56,96,0.5); }

@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
.blink { animation: blink 1s step-end infinite; }

.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 12px;
  border-bottom: 3px solid #2a1a4a;
  margin-bottom: 14px;
  font-size: 14px;
  flex: 0 0 auto;
}

.hud-cell { display: flex; gap: 12px; align-items: center; }

.lang-btn {
  background: transparent;
  border: 3px solid #4dffea;
  color: #4dffea;
  font-family: inherit;
  font-size: 14px;
  padding: 10px 16px;
  cursor: pointer;
  text-shadow: 0 0 8px #4dffea;
}
.lang-btn:hover { background: #4dffea; color: #0d0221; text-shadow: none; }

.score-pip {
  width: 22px;
  height: 22px;
  border: 3px solid #4dffea;
  display: inline-block;
}
.score-pip.filled { background: #44ff7c; border-color: #44ff7c; box-shadow: 0 0 8px #44ff7c; }
.score-pip.wrong { background: #ff3860; border-color: #ff3860; }

.title-stack {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  text-align: center;
  gap: 14px;
  padding: 14px 0;
  min-height: 0;
  overflow-y: auto;
}

.title-sub {
  font-size: 18px;
  opacity: 0.85;
}

.start-btn {
  background: #ffd23f;
  color: #0d0221;
  border: none;
  padding: 18px 32px;
  font-family: inherit;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 6px 6px 0 #2a1a4a;
  position: relative;
  top: 0;
  left: 0;
  transition: all 0.05s;
}
.start-btn:hover { background: #fff; }
.start-btn:active { top: 6px; left: 6px; box-shadow: 0 0 0 #2a1a4a; }

.question-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 0;
}

.scenario-box {
  background: #1a0a3e;
  border: 4px solid #4dffea;
  padding: 20px 24px;
  font-size: 24px;
  line-height: 1.8;
  white-space: pre-line;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  box-shadow: inset 0 0 30px rgba(77,255,234,0.1);
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.scenario-label {
  font-size: 14px;
  color: #ffd23f;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.stage {
  flex: 1 1 90px;
  background: linear-gradient(to bottom, #0d0221 0%, #1a0a3e 70%, #2a1a4a 100%);
  border: 4px solid #2a1a4a;
  position: relative;
  min-height: 90px;
  overflow: hidden;
}

.ground {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 22px;
  background:
    repeating-linear-gradient(
      90deg,
      #44ff7c 0,
      #44ff7c 10px,
      #2a8a44 10px,
      #2a8a44 20px
    );
  border-top: 4px solid #44ff7c;
  box-shadow: 0 -3px 15px rgba(68,255,124,0.3);
}

.star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #fff;
  box-shadow: 0 0 5px #fff;
}

.choices-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 18px;
  align-items: stretch;
  flex: 0 0 auto;
}

.choice-btn {
  background: #1a0a3e;
  border: 4px solid;
  padding: 14px 14px;
  font-family: inherit;
  font-size: 22px;
  line-height: 1.4;
  cursor: pointer;
  text-align: center;
  transition: transform 0.08s;
  position: relative;
  min-height: 76px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.choice-btn:hover:not(:disabled) {
  transform: translate(-3px, -3px);
  box-shadow: 6px 6px 0 #000;
}
.choice-btn:disabled { cursor: not-allowed; opacity: 0.5; }

.choice-left { border-color: #4dffea; color: #4dffea; }
.choice-right { border-color: #ff2bd6; color: #ff2bd6; }

.choice-key {
  font-size: 12px;
  opacity: 0.7;
  letter-spacing: 1px;
}

.choice-vs {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #ffd23f;
  text-shadow: 0 0 10px #ffd23f;
}

.feedback-box {
  background: #1a0a3e;
  border: 4px solid;
  padding: 18px 22px;
  font-size: 18px;
  line-height: 1.7;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.feedback-box.correct { border-color: #44ff7c; }
.feedback-box.wrong { border-color: #ff3860; }

.feedback-head {
  font-size: 28px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.next-btn {
  align-self: flex-end;
  background: transparent;
  border: 3px solid #ffd23f;
  color: #ffd23f;
  font-family: inherit;
  font-size: 16px;
  padding: 12px 20px;
  cursor: pointer;
  text-shadow: 0 0 8px #ffd23f;
}
.next-btn:hover { background: #ffd23f; color: #0d0221; text-shadow: none; }

.end-stack {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  padding: 10px 0;
  text-align: center;
  min-height: 0;
  overflow-y: auto;
}

.end-headline {
  font-size: clamp(28px, 5vw, 48px);
  line-height: 1.3;
}

.end-score {
  font-size: 26px;
}

.end-stage {
  width: 100%;
  height: 140px;
  flex: 0 0 auto;
  background: linear-gradient(to bottom, #0d0221, #1a0a3e 70%, #2a1a4a);
  border: 4px solid #2a1a4a;
  position: relative;
  overflow: hidden;
}

.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  animation: fall linear infinite;
}
@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); }
  100% { transform: translateY(260px) rotate(360deg); }
}

.stickman {
  position: absolute;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  width: 96px;
  height: 144px;
}
.stickman.thinking { animation: bob 1.6s steps(2) infinite; }
@keyframes bob {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-4px); }
}

.stickman.cheer { animation: cheer 0.5s steps(2) infinite; }
@keyframes cheer {
  0%, 100% { transform: translateX(-50%) translateY(0) rotate(-3deg); }
  50% { transform: translateX(-50%) translateY(-12px) rotate(3deg); }
}

.stickman.dance { animation: dance 0.4s steps(4) infinite; }
@keyframes dance {
  0% { transform: translateX(-50%) translateY(0) scaleX(1); }
  25% { transform: translateX(-30%) translateY(-8px) scaleX(1); }
  50% { transform: translateX(-50%) translateY(0) scaleX(-1); }
  75% { transform: translateX(-70%) translateY(-8px) scaleX(-1); }
  100% { transform: translateX(-50%) translateY(0) scaleX(1); }
}

.stickman.sad { animation: sad 2s steps(2) infinite; }
@keyframes sad {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(2px); }
}

.hint {
  font-size: 14px;
  opacity: 0.6;
  text-align: center;
  margin-top: 10px;
}

.result-row {
  display: flex;
  gap: 18px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
  font-size: 16px;
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  92% { opacity: 1; }
  93% { opacity: 0.4; }
  94% { opacity: 1; }
  97% { opacity: 0.6; }
  98% { opacity: 1; }
}
.flicker { animation: flicker 4s infinite; }

.coin-row {
  font-size: 14px;
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.choice-btn.flash-correct { animation: flashCorrect 0.5s steps(4); }
.choice-btn.flash-wrong { animation: flashWrong 0.5s steps(4); }
@keyframes flashCorrect {
  0%, 100% { background: #1a0a3e; }
  50% { background: #44ff7c; color: #0d0221; }
}
@keyframes flashWrong {
  0%, 100% { background: #1a0a3e; }
  50% { background: #ff3860; color: #fff; }
}

.logo-art {
  font-size: clamp(48px, 8vw, 96px);
  line-height: 1.1;
  color: #ffd23f;
  font-weight: 900;
  text-shadow:
    4px 4px 0 #ff2bd6,
    8px 8px 0 #4dffea,
    12px 12px 0 #2a1a4a;
  letter-spacing: 4px;
}

.title-sub-text {
  font-size: clamp(14px, 2vw, 20px);
  color: #ffd23f;
  font-weight: 900;
  text-shadow: 0 0 10px #ffd23f, 0 0 20px rgba(255,210,63,0.5);
  letter-spacing: 2px;
  text-align: center;
  line-height: 1.8;
}

.source-ribbon {
  font-size: 12px;
  text-align: center;
  opacity: 0.5;
  margin-top: 8px;
}

::-webkit-scrollbar { width: 12px; height: 12px; }
::-webkit-scrollbar-track { background: #0d0221; }
::-webkit-scrollbar-thumb { background: #4dffea; border: 2px solid #0d0221; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script>
// Question bank - real Taiwan disinformation cases
window.QUESTION_BANK = [
  // === 釣魚連結 / Phishing URLs ===
  {
    id: "phish_nhi_cn",
    scenario_zh: "你收到簡訊：\n「您的健保卡將於72小時內停用，請至 nhi.gov.cn 重新驗證身份」",
    scenario_en: "SMS received:\n\"Your NHI card will be suspended in 72 hrs. Verify at nhi.gov.cn\"",
    left:  { label_zh: "點連結驗證",          label_en: "Click & verify" },
    right: { label_zh: "直接打電話給健保署",   label_en: "Call NHI directly" },
    correct: "right",
    explain_zh: "台灣健保署官網是 nhi.gov.tw，.cn 是中國網域。政府機關絕不會用 .cn 網址，也不會用簡訊要你點連結驗證身份。",
    explain_en: "Taiwan's NHI official site is nhi.gov.tw — .cn is a Chinese domain. Government agencies never use .cn URLs or SMS links to verify identity."
  },
  {
    id: "phish_toiwan",
    scenario_zh: "朋友傳來連結：\nwww.toiwan-news.com\n說是最新台海緊急軍情新聞",
    scenario_en: "Friend sends:\nwww.toiwan-news.com\nClaims it's urgent Taiwan Strait military news",
    left:  { label_zh: "馬上點開看",          label_en: "Click to read now" },
    right: { label_zh: "發現拼字錯誤，不點",   label_en: "Spot the typo, don't click" },
    correct: "right",
    explain_zh: "toiwan 是 taiwan 的釣魚拼法，利用相似發音讓人忽略。點開前先確認網域拼字是否正確，緊急新聞可直接查 CNA、自由時報等官方媒體。",
    explain_en: "\"toiwan\" is a phishing misspelling of \"taiwan.\" Always check domain spelling before clicking. For urgent news, go directly to CNA or other verified media outlets."
  },
  {
    id: "phish_bamk",
    scenario_zh: "收到 Email：\n「您的網路銀行帳戶異常，請登入 esunbamk.com.tw 處理」",
    scenario_en: "Email received:\n\"Your online banking is flagged. Log in at esunbamk.com.tw\"",
    left:  { label_zh: "點連結登入",          label_en: "Click & log in" },
    right: { label_zh: "自己輸入銀行官網網址", label_en: "Type the real URL manually" },
    correct: "right",
    explain_zh: "bamk 是 bank 的拼字陷阱，視覺上容易忽略。玉山銀行真正網址是 esunbank.com.tw。任何要求點連結登入銀行的訊息都應直接輸入官網網址查證。",
    explain_en: "\"bamk\" vs \"bank\" — easy to miss at a glance. Real ESun Bank is esunbank.com.tw. Never click login links in emails; type the official URL directly."
  },
  {
    id: "phish_taivan_tax",
    scenario_zh: "Google 搜尋「台灣財政部退稅」\n第一個廣告結果是 mof-taivan.com",
    scenario_en: "Google search \"Taiwan MOF tax refund\"\nTop ad result: mof-taivan.com",
    left:  { label_zh: "點廣告連結申請退稅",   label_en: "Click the ad to apply" },
    right: { label_zh: "找 .gov.tw 的官方網站", label_en: "Find the .gov.tw official site" },
    correct: "right",
    explain_zh: "taivan 是 taiwan 的釣魚變體。廣告位置可以被任何人購買，排名靠前不代表是官方。台灣政府機關一律使用 .gov.tw 網域。",
    explain_en: "\"taivan\" mimics \"taiwan.\" Anyone can buy ad placements — high ranking doesn't mean official. Taiwan government sites always use .gov.tw."
  },
  {
    id: "phish_gov_tw_cn",
    scenario_zh: "收到 LINE 訊息：\n「您有稅務未繳，請至 etax.nat.gov.tw.cn 完成繳費」",
    scenario_en: "LINE message:\n\"Unpaid tax notice — pay at etax.nat.gov.tw.cn\"",
    left:  { label_zh: "點連結繳費",          label_en: "Click & pay" },
    right: { label_zh: "直接上 etax.nat.gov.tw", label_en: "Go to etax.nat.gov.tw directly" },
    correct: "right",
    explain_zh: "etax.nat.gov.tw.cn 看起來有 gov.tw，但真正的網域是最後的 .cn。判斷網域要從最後一個點往前讀：.cn 才是真正的頂級網域。",
    explain_en: "The real domain is read from right to left after the last dot — .cn is the actual TLD here, not .gov.tw. The real site is etax.nat.gov.tw with nothing after it."
  },
  {
    id: "phish_post_zero",
    scenario_zh: "收到簡訊：\n「您的包裹無法投遞，請至 chunghwa-p0st.com 更新地址」",
    scenario_en: "SMS:\n\"Package undeliverable — update address at chunghwa-p0st.com\"",
    left:  { label_zh: "點連結更新地址",       label_en: "Click & update" },
    right: { label_zh: "直接上中華郵政官網查", label_en: "Check post.gov.tw directly" },
    correct: "right",
    explain_zh: "p0st 把字母 o 換成數字 0，是常見視覺欺騙手法。中華郵政官網是 post.gov.tw，不是 .com。郵政也不會用簡訊要你點連結更新地址。",
    explain_en: "\"p0st\" replaces the letter O with a zero — a classic visual trick. Real Chunghwa Post is post.gov.tw. They never send SMS links to update delivery addresses."
  },
  {
    id: "phish_cec_taiwam",
    scenario_zh: "選舉前收到 Email：\n「中選會投票資格驗證，請至 cec-taiwam.org 確認」",
    scenario_en: "Pre-election email:\n\"CEC voter eligibility check — confirm at cec-taiwam.org\"",
    left:  { label_zh: "點連結確認資格",       label_en: "Click to confirm" },
    right: { label_zh: "只信 cec.gov.tw",      label_en: "Trust only cec.gov.tw" },
    correct: "right",
    explain_zh: "taiwam 是 taiwan 的拼字陷阱，m 取代 n 視覺上很難發現。中選會官網是 cec.gov.tw。選前釣魚網站目的是竊取個資或散播選舉混亂。",
    explain_en: "\"taiwam\" swaps N for M — nearly invisible. Real CEC is cec.gov.tw. Pre-election phishing sites aim to steal personal data or sow electoral confusion."
  },
  {
    id: "phish_mnd_cn",
    scenario_zh: "同事傳來「國防部最新機密文件」連結：\nmnd-tw.com.cn/classified",
    scenario_en: "Colleague sends \"MND classified document\" link:\nmnd-tw.com.cn/classified",
    left:  { label_zh: "好奇點開看看",         label_en: "Click out of curiosity" },
    right: { label_zh: "立刻通報資安人員",      label_en: "Report to security team immediately" },
    correct: "right",
    explain_zh: ".com.cn 是中國商業網域，國防部官網是 mnd.gov.tw。機密文件絕不會用公開連結傳送。這是針對國防人員的魚叉式釣魚攻擊（Spear Phishing）典型手法。",
    explain_en: ".com.cn is a Chinese commercial domain. Real MND is mnd.gov.tw. Classified files are never shared via public links — this is a classic spear phishing attack targeting defense personnel."
  },
  {
    id: "phish_tsmc_cn",
    scenario_zh: "人力銀行出現職缺：\n「台積電海外擴廠招募，請將履歷寄至 hr@tsmc-careers.cn」",
    scenario_en: "Job board listing:\n\"TSMC overseas expansion hiring — send CV to hr@tsmc-careers.cn\"",
    left:  { label_zh: "寄出履歷",            label_en: "Send your CV" },
    right: { label_zh: "到台積電官網確認招募管道", label_en: "Verify via tsmc.com careers page" },
    correct: "right",
    explain_zh: "台積電官方招募透過 tsmc.com，不會用 .cn 信箱收履歷。履歷含個資，寄錯對象可能造成資料外洩，也可能是針對半導體人才的情報蒐集行動。",
    explain_en: "TSMC recruits via tsmc.com only — never a .cn email. Sending your CV here risks data theft and may be an intelligence-gathering operation targeting semiconductor talent."
  },
  {
    id: "phish_ltn_one",
    scenario_zh: "查核新聞時，來源網址是：\nwww.1iberty-times.com",
    scenario_en: "Fact-checking a news story — source URL:\nwww.1iberty-times.com",

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const SCENE = {
  TITLE: 'title',

  END: 'end'
};

const QUESTIONS_PER_RUN = 5;

// Stickman component
const Stickman = ({ pose = 'idle', color = '#ffffff' }) => {
  const cell = 4;
  const W = 20, H = 22;

  // Hollow circle head: outer ring pixels only (on a 20-wide grid, head centered at x=9-10)
  // Head outline: 4x4 circle outline at cols 7-12, rows 0-5
  const HEAD = [
    // top edge
    [8,0],[9,0],[10,0],[11,0],
    // sides
    [7,1],[12,1],[7,2],[12,2],[7,3],[12,3],[7,4],[12,4],
    // bottom edge
    [8,5],[9,5],[10,5],[11,5],
  ];

  // Neck
  const NECK = [[9,6],[10,6]];

  // Body (torso)
  const BODY = [[9,7],[10,7],[9,8],[10,8],[9,9],[10,9],[9,10],[10,10],[9,11],[10,11]];

  // Poses define: arms + legs only
  const POSE_PARTS = {
    idle: {
      arms: [[3,8],[4,8],[5,8],[6,8],[13,8],[14,8],[15,8],[16,8]],
      legs: [[9,12],[8,13],[7,14],[6,15],[10,12],[11,13],[12,14],[13,15]]
    },
    cheer: {
      arms: [[4,4],[5,5],[6,6],[7,7],[15,4],[14,5],[13,6],[12,7]],
      legs: [[9,12],[8,13],[7,14],[6,15],[10,12],[11,13],[12,14],[13,15]]
    },
    sad: {
      arms: [[4,10],[5,9],[6,8],[7,8],[13,8],[14,9],[15,10],[16,10]],
      legs: [[9,12],[8,13],[7,14],[6,15],[10,12],[11,13],[12,14],[13,15]]
    },
    danceA: {
      arms: [[3,6],[4,7],[5,7],[6,8],[13,9],[14,10],[15,11],[16,12]],
      legs: [[9,12],[8,13],[7,14],[6,15],[10,12],[11,12],[12,13],[13,14]]
    },
    danceB: {
      arms: [[3,9],[4,10],[5,10],[6,9],[13,7],[14,6],[15,6],[16,7]],
      legs: [[9,12],[8,12],[7,13],[6,14],[10,12],[11,13],[12,14],[13,15]]
    },
    walk: {
      arms: [[3,7],[4,7],[5,8],[6,8],[13,9],[14,9],[15,10],[16,10]],
      legs: [[9,12],[8,13],[7,14],[6,15],[10,12],[11,12],[12,13],[13,14]]
    }
  };

  const parts = POSE_PARTS[pose] || POSE_PARTS.idle;
  const allPixels = [...HEAD, ...NECK, ...BODY, ...parts.arms, ...parts.legs];

  return (
    <svg viewBox={`0 0 ${W*cell} ${H*cell}`} width="100%" height="100%" shapeRendering="crispEdges">
      {allPixels.map(([x, y], i) => (
        <rect key={i} x={x*cell} y={y*cell} width={cell} height={cell} fill={color} />
      ))}
    </svg>
  );
};

const AnimatedStickman = ({ animation = 'idle', color = '#ffffff' }) => {
  const [frame, setFrame] = useState(0);

  useEffect(() => {
    if (animation === 'idle' || animation === 'sad') {
      setFrame(0);
      return;
    }
    const interval = setInterval(() => {
      setFrame(f => (f + 1) % 2);
    }, animation === 'dance' ? 220 : 360);
    return () => clearInterval(interval);
  }, [animation]);

  let pose = 'idle';
  if (animation === 'idle') pose = frame === 0 ? 'idle' : 'walk';
  else if (animation === 'sad') pose = 'sad';
  else if (animation === 'cheer') pose = frame === 0 ? 'cheer' : 'idle';
  else if (animation === 'dance') pose = frame === 0 ? 'danceA' : 'danceB';

  return <Stickman pose={pose} color={color} />;
};

// Stars background
const Stars = ({ count = 30 }) => {
  const stars = useMemo(() => {
    return Array.from({ length: count }, (_, i) => ({
      left: Math.random() * 100,
      top: Math.random() * 70,
      delay: Math.random() * 2
    }));
  }, [count]);
  return (
    <>
      {stars.map((s, i) => (
        <div key={i} className="star" style={{
          left: `${s.left}%`,
          top: `${s.top}%`,
          opacity: 0.3 + Math.random() * 0.7
        }}/>
      ))}
    </>
  );
};

// Confetti
const Confetti = ({ count = 40 }) => {
  const colors = ['#ffd23f', '#ff2bd6', '#4dffea', '#44ff7c', '#ff3860'];
  const pieces = useMemo(() => {
    return Array.from({ length: count }, () => ({
      left: Math.random() * 100,
      delay: Math.random() * 2,
      duration: 1.5 + Math.random() * 2,
      color: colors[Math.floor(Math.random() * colors.length)]
    }));
  }, [count]);
  return (
    <>
      {pieces.map((p, i) => (
        <div key={i} className="confetti" style={{
          left: `${p.left}%`,
          background: p.color,
          animationDuration: `${p.duration}s`,
          animationDelay: `${p.delay}s`
        }}/>
      ))}
    </>
  );
};

function pickN(arr, n) {
  const copy = [...arr];
  const out = [];
  for (let i = 0; i < n && copy.length; i++) {
    const idx = Math.floor(Math.random() * copy.length);
    out.push(copy.splice(idx, 1)[0]);
  }
  return out;
}

// Title Screen
const TitleScreen = ({ lang, onStart, T }) => (
  <div className="title-stack">
    <Stars count={20}/>
    <div className="logo-art flicker">Cybersecurity</div>
    <div className="title-sub-text">資訊安全與數位操弄</div>
    <div style={{width: 96, height: 96, marginTop: 8}}>
      <AnimatedStickman animation="idle" color="#4dffea"/>
    </div>
    <div className="px glow-yellow" style={{fontSize: 18, lineHeight: 1.9, maxWidth: 720}}>
      {T(
        '5 道題，每題二選一\n答錯沒關係\n每個人都會犯錯',
        '5 QUESTIONS · 2 CHOICES EACH\nIT\'S OK TO GET ONE WRONG\nEVERYONE MAKES MISTAKES'
      ).split('\n').map((line, i) => <div key={i}>{line}</div>)}
    </div>
    <button className="start-btn" onClick={onStart}>{T('▶ 投幣開始', '▶ INSERT COIN')}</button>
    <div className="hint">{T('按 ENTER 或 SPACE 也可以', 'PRESS ENTER OR SPACE')}</div>
    <div className="coin-row px" style={{opacity: 0.5}}>
      <span className="glow-cyan">A / ←</span>
      <span style={{opacity: 0.4}}>=</span>
      <span>{T('左選項', 'LEFT')}</span>
      <span style={{opacity: 0.3}}>·</span>
      <span className="glow-pink">D / →</span>
      <span style={{opacity: 0.4}}>=</span>
      <span>{T('右選項', 'RIGHT')}</span>
    </div>
    <div className="source-ribbon px">{T('題材參考 COFACTS', 'SOURCES: COFACTS')}</div>
  </div>
);

// Question Screen
const QuestionScreen = ({ q, qIndex, total, lang, onChoose, flashSide, lastChoice, T }) => (
  <div className="question-area">
    <div className="scenario-box">
      <div className="scenario-label">{T(`場景 ${qIndex+1} / ${total}`, `SCENE ${qIndex+1} / ${total}`)}</div>
      <div className="px" style={{fontSize: 24, lineHeight: 1.9}}>
        {lang === 'zh' ? q.scenario_zh : q.scenario_en}
      </div>
    </div>
    <div className="choices-row">
      <button
        className={`choice-btn choice-left ${flashSide === 'left' ? (lastChoice === q.correct ? 'flash-correct' : 'flash-wrong') : ''}`}
        onClick={() => onChoose('left')}
        disabled={!!lastChoice}
      >
        <div className="choice-key">◀ A / ←</div>
        <div>{lang === 'zh' ? q.left.label_zh : q.left.label_en}</div>
      </button>
      <div className="choice-vs">VS</div>
      <button
        className={`choice-btn choice-right ${flashSide === 'right' ? (lastChoice === q.correct ? 'flash-correct' : 'flash-wrong') : ''}`}
        onClick={() => onChoose('right')}
        disabled={!!lastChoice}
      >
        <div className="choice-key">D / ▶ →</div>
        <div>{lang === 'zh' ? q.right.label_zh : q.right.label_en}</div>
      </button>
    </div>
  </div>
);

// Feedback Screen
const FeedbackScreen = ({ q, isCorrect, lang, onNext, isLast, T }) => (
  <div className="question-area">
    <div className={`feedback-box ${isCorrect ? 'correct' : 'wrong'}`}>
      <div className={`feedback-head px ${isCorrect ? 'glow-green' : 'glow-red'}`}>
        {isCorrect ? T('✓ 正確！', '✓ CORRECT!') : T('✗ 答錯了', '✗ WRONG')}
      </div>
      <div className="px" style={{fontSize: 14, opacity: 0.7, letterSpacing: 1}}>
        {T('正解', 'CORRECT ANSWER')}: <span className={isCorrect ? 'glow-green' : 'glow-yellow'}>
          {q.correct === 'left'
            ? (lang === 'zh' ? q.left.label_zh : q.left.label_en)
            : (lang === 'zh' ? q.right.label_zh : q.right.label_en)}
        </span>
      </div>
      <div className="px" style={{fontSize: 24, lineHeight: 1.9}}>
        {lang === 'zh' ? q.explain_zh : q.explain_en}
      </div>
      <button className="next-btn" onClick={onNext}>
        {isLast ? T('看結果 ▶', 'SEE RESULTS ▶') : T('下一題 ▶', 'NEXT ▶')}
        <span style={{opacity: 0.5, marginLeft: 10, fontSize: 12}}>[ENTER]</span>
      </button>
    </div>
  </div>
);

// End Screen
const EndScreen = ({ correctCount, total, allCorrect, results, lang, onRestart, T }) => {
  let animation = 'idle';
  let stickColor = '#ffd23f';
  let headline_zh, headline_en, sub_zh, sub_en;

  if (allCorrect) {
    animation = 'dance'; stickColor = '#ffd23f';
    headline_zh = '★ 全 部 答 對 ★'; headline_en = '★ FLAWLESS ★';
    sub_zh = '你是防詐特攻隊員！'; sub_en = 'You are a Cyber Guard!';
  } else if (correctCount >= 3) {
    animation = 'cheer'; stickColor = '#4dffea';
    headline_zh = '不 錯！'; headline_en = 'NOT BAD!';
    sub_zh = '繼續精進辨識力'; sub_en = 'Keep sharpening your eyes';
  } else {
    animation = 'sad'; stickColor = '#ff3860';
    headline_zh = '差 一 點 ⋯'; headline_en = 'CLOSE ⋯';
    sub_zh = '看完解說再挑戰一次'; sub_en = 'Review the tips & retry';
  }

  return (
    <div className="end-stack">
      <div className={`px ${allCorrect ? 'glow-yellow flicker' : correctCount >= 3 ? 'glow-cyan' : 'glow-red'} end-headline`}>
        {T(headline_zh, headline_en)}
      </div>
      <div className="px glow-cyan" style={{fontSize: 18}}>{T(sub_zh, sub_en)}</div>
      <div className="end-stage">
        {allCorrect && <Confetti count={50}/>}
        <Stars count={15}/>
        <div className="ground"/>
        <div style={{width: 80, height: 120, position: 'absolute', bottom: 22, left: '50%', transform: 'translateX(-50%)'}}>
          <AnimatedStickman animation={animation} color={stickColor}/>
        </div>
      </div>
      <div className="end-score px glow-yellow">
        {T('得分', 'SCORE')}: <span className="glow-green">{correctCount}</span> / {total}
      </div>
      <div className="result-row">
        {results.map((r, i) => (
          <span key={i} className="px" style={{display:'flex', flexDirection:'column', alignItems:'center', gap:4}}>
            <span style={{fontSize: 14, opacity: 0.6}}>Q{i+1}</span>
            <span className={r ? 'glow-green' : 'glow-red'} style={{fontSize: 24}}>{r ? '✓' : '✗'}</span>
          </span>
        ))}
      </div>
      <button className="start-btn" onClick={onRestart}>{T('▶ 再玩一次', '▶ PLAY AGAIN')}</button>
      <div className="hint">{T('按 ENTER 或 SPACE 也可以', 'PRESS ENTER OR SPACE')}</div>
      {allCorrect && (
        <div className="px glow-pink" style={{fontSize: 14, marginTop: 6, textAlign: 'center', maxWidth: 720, lineHeight: 1.8}}>
          {T(
            '◆ 解鎖：HIGH SCORE 100% ◆\n把這個遊戲分享給家人朋友',
            '◆ UNLOCKED: HIGH SCORE 100% ◆\nShare this game with friends & family'
          ).split('\n').map((line, i) => <div key={i}>{line}</div>)}
        </div>
      )}
    </div>
  );
};

// Main App
const App = () => {
  const [scene, setScene] = useState(SCENE.TITLE);
  const [lang, setLang] = useState('zh');
  const [questions, setQuestions] = useState([]);
  const [qIndex, setQIndex] = useState(0);
  const [results, setResults] = useState([]);
  const [lastChoice, setLastChoice] = useState(null);
  const [flashSide, setFlashSide] = useState(null);

  const T = (zh, en) => lang === 'zh' ? zh : en;

  useEffect(() => {
    const onKey = (e) => {
      if (scene === SCENE.QUESTION) {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') choose('left');
        else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') choose('right');
      } else if (scene === SCENE.FEEDBACK) {
        if (e.key === 'Enter' || e.key === ' ') next();
      } else if (scene === SCENE.TITLE) {
        if (e.key === 'Enter' || e.key === ' ') start();
      } else if (scene === SCENE.END) {
        if (e.key === 'Enter' || e.key === ' ') start();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  const start = () => {
    const picked = pickN(window.QUESTION_BANK, QUESTIONS_PER_RUN);
    setQuestions(picked);
    setQIndex(0);
    setResults([]);
    setLastChoice(null);
    setFlashSide(null);
    setScene(SCENE.QUESTION);
  };

  const choose = (side) => {
    if (lastChoice) return;
    const q = questions[qIndex];
    const isCorrect = side === q.correct;
    setLastChoice(side);
    setFlashSide(side);
    setResults(r => [...r, isCorrect]);
    setTimeout(() => { setScene(SCENE.FEEDBACK); }, 600);
  };

  const next = () => {
    setLastChoice(null);
    setFlashSide(null);
    if (qIndex + 1 >= questions.length) {
      setScene(SCENE.END);
    } else {
      setQIndex(i => i + 1);
      setScene(SCENE.QUESTION);
    }
  };

  const correctCount = results.filter(Boolean).length;
  const allCorrect = correctCount === QUESTIONS_PER_RUN && results.length === QUESTIONS_PER_RUN;

  return (
    <div className="cabinet">
      <div className="screen">
        <div className="pixel-border"/>
        <div className="hud">
          <div className="hud-cell">
            <span className="px glow-yellow">FREEDOM</span>
            <span className="px blink glow-pink">●</span>
          </div>
          <div className="hud-cell">
            {(scene === SCENE.QUESTION || scene === SCENE.FEEDBACK) ? (
              <>
                <span className="px" style={{fontSize:14, opacity:0.6}}>{T('題', 'Q')}</span>
                {Array.from({length: QUESTIONS_PER_RUN}).map((_, i) => {
                  let cls = 'score-pip';
                  if (i < results.length) cls += results[i] ? ' filled' : ' wrong';
                  return <span key={i} className={cls}/>;
                })}
              </>
            ) : null}
          </div>
          <div className="hud-cell">
            <button className="lang-btn" onClick={() => setLang(l => l === 'zh' ? 'en' : 'zh')}>
              {lang === 'zh' ? 'EN' : '中文'}
            </button>
          </div>
        </div>

        {scene === SCENE.TITLE && <TitleScreen lang={lang} onStart={start} T={T}/>}
        {scene === SCENE.QUESTION && (
          <QuestionScreen
            q={questions[qIndex]} qIndex={qIndex} total={QUESTIONS_PER_RUN}
            lang={lang} onChoose={choose} flashSide={flashSide} lastChoice={lastChoice} T={T}
          />
        )}
        {scene === SCENE.FEEDBACK && (
          <FeedbackScreen
            q={questions[qIndex]} isCorrect={results[results.length - 1]}
            lang={lang} onNext={next} isLast={qIndex + 1 >= QUESTIONS_PER_RUN} T={T}
          />
        )}
        {scene === SCENE.END && (
          <EndScreen
            correctCount={correctCount} total={QUESTIONS_PER_RUN}
            allCorrect={allCorrect} results={results}
            lang={lang} onRestart={start} T={T}
          />
        )}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
